name: 第二章·暗流
contentBrief: 主角潜入敌营探查情报
contentDetail: >
  夜色中，林远翻越围墙潜入敌营。巡逻的火把光影交错，
  他在暗处屏息等待时机。一个意外的声响差点暴露行踪，
  千钧一发之际，一个神秘身影替他引开了守卫。
