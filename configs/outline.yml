entity: Outline

fields:
  name:
    type: text
    label: 章纲标题
    placeholder: 章纲标题
  contentBrief:
    type: text
    label: 概要
    placeholder: 一句话概括本章（最多80字）
    maxLength: 80
  contentDetail:
    type: longtext
    label: 详细内容
    placeholder: 详细描述本章情节发展和关键节点...
    maxLength: 400
  status:
    type: single
    label: 状态
    options:
      - { value: 已规划,  icon: Calendar, color: neutral }
      - { value: 进行中, icon: Pen, color: primary }
      - { value: 已完成,  icon: CheckCircle, color: success }
  tone:
    type: single
    label: 基调
    options: tone

sections:  
  - type: card
    title: 基本信息
    icon: FileText
    class: space-y-3
    fields: [name, contentBrief, contentDetail, status]
  - type: card
    title: 基调
    icon: MapPin
    fields: [tone]
