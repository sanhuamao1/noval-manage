entity: Novel

fields:
  title:
    type: text
    label: 作品名称
    placeholder: 作品名称
  oneLineSummary:
    type: longtext
    label: 一句话梗概
    placeholder: 用一句话概括你的作品...
    maxLength: 100
    mergeCells: true
  description:
    type: longtext
    label: 简介
    placeholder: 用一段话描述你的作品...
    maxLength: 800
    mergeCells: true
  status:
    type: single
    label: 状态
    options: novel-status
    icon: Activity
    noLabel: true
  genre:
    type: multi
    label: 题材
    max: 2
    options: genre
    noLabel: true
    innerDisplay: grid-5
  presetStyle:
    type: single
    label: 文风
    options: preset-style
    innerDisplay: grid-4
    noLabel: true
  primaryTone:
    type: single
    label: 主基调
    options: tone
    innerDisplay: grid-4
    noLabel: true
  secondaryTones:
    type: multi
    label: 副基调
    max: 2
    options: tone
    innerDisplay: grid-4
    noLabel: true
  worldShape:
    type: single
    label: 世界形态
    options: world-shape
    noLabel: true

sections:
  - type: card
    title: 基本信息
    icon: BookOpen
    class: grid grid-cols-2 gap-2
    fields: [title, status, oneLineSummary, description]

  - type: tabs
    title: 作品设定
    children:
      - key: presetStyle
        label: 文风
        fields: [presetStyle]
      - key: genre
        label: 题材
        fields: [genre]
      - key: world
        label: 世界形态
        fields: [worldShape]
      - key: primaryTone
        label: 主基调
        fields: [primaryTone]
      - key: secondaryTones
        label: 副基调
        fields: [secondaryTones]