entity: Novel

fields:
  title:
    type: text
    label: 作品名称
    placeholder: 作品名称
  description:
    type: longtext
    label: 简介 / 梗概
    placeholder: 用一段话描述你的作品...
    maxLength: 2000
    className: col-span-full
  status:
    type: single
    label: 状态
    options: novel-status
    icon: Activity
    display: flex
    className: grid grid-cols-3 gap-1
  genre:
    type: multi
    label: 题材
    max: 2
    options: genre
    display: flex
    variant: box
    noLabel: true
    className: gap-2
  enablePreset:
    type: toggle
    label: 启用预设文风
    display: between
  presetStyle:
    type: single
    label: 预设文风
    options: preset-style
    icon: BookMarked
    display: flex
    noLabel: true
    className: grid grid-cols-3 gap-2
  primaryTone:
    type: single
    label: 主基调
    options: tone
    display: flex
    icon: Palette
    noLabel: true
    className: grid grid-cols-4 gap-2
  secondaryTones:
    type: multi
    label: 副基调
    max: 2
    options: tone
    display: flex
    noLabel: true
    icon: Layers
    className: grid grid-cols-4 gap-2
  worldType:
    type: single
    label: 世界类型
    options: world-type
    className: grid grid-cols-2 gap-2
  worldShape:
    type: single
    label: 世界形态
    options: world-shape
    className: grid grid-cols-2 gap-2

sections:
  - type: card
    title: 基本信息
    icon: BookOpen
    class: grid grid-cols-2 gap-4
    fields: [title, status, description]

  - type: tabs
    title: 作品设定
    children:
      - key: enablePreset
        label: 预设文风
        type: tab-group
        class: space-y-2
        fields: [enablePreset, presetStyle]
      - key: primaryTone
        label: 主基调
        fields: [primaryTone]
      - key: secondaryTones
        label: 副基调
        fields: [secondaryTones]

  - type: tabs
    title: 世界观
    children:
      - key: genre
        label: 题材
        fields: [genre]
      - key: world
        label: 世界
        type: tab-group
        class: grid grid-cols-2 gap-2
        fields: [worldType, worldShape]
