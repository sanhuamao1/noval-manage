# 预设文风数据
options:
  preset-style:
    - { value: 古龙体, icon: Sword, description: "短句为主，多用对仗与排比，留白极多。善用极简动作描写刻画人物，气氛冷峻肃杀。对话干脆利落，常用一句一段制造节奏感。环境描写点到为止，重视意境胜过细节铺陈。" }
    - { value: 金庸体, icon: ScrollText, description: "文笔典雅厚重，融入古典诗词与历史典故。武功描写细腻生动，招式名目考究。叙事稳健，重情节跌宕与人物群像。对话贴合身份，方言与文言点缀其间。" }
    - { value: 网文爽文体, icon: Moon, description: "节奏明快，多用短段落与断句制造阅读爽感。重冲突推进与情绪爆发，常以悬念钩子收尾。心理活动直白，金手指与系统提示穿插其中。环境描写服务于氛围渲染，不冗长。" }
    - { value: 传统文学体, icon: BookOpen, description: "语言凝练考究，长句与短句交替。重心理刻画与环境烘托，叙事节奏舒缓。多用隐喻与象征，留有阐释空间。对话含蓄，潜台词丰富。" }
    - { value: 王朔体, icon: Theater, description: "京味口语化，调侃与反讽贯穿始终。叙述者带着戏谑距离感，正经话用痞气说。对话密集，机锋暗藏，常以插科打诨解构严肃。" }
    - { value: 余华体, icon: Wind, description: "冷峻克制，近乎零度叙事。情感不外露，靠白描动作与事件传递力量。语言朴素洗练，重复句式制造节奏。苦难叙事中带荒诞感。" }
    - { value: 意识流体, icon: Waves, description: "长句流动，心理活动与外部事件交织。时间非线性跳跃，记忆与当下叠印。感官细节浓密，主观感受压倒客观描写。" }
    - { value: 极简白描体, icon: Zap, description: "动词驱动，形容词极省。场景靠动作与对话搭建，不写情绪只写行为。句子短，信息密度高，留白由读者填充。" }
    - { value: 影视画面体, icon: Palette, description: "强烈的镜头感，场景切换明确。重视觉细节与运动描写，对话简短承担叙事。氛围渲染浓墨重彩，节奏快慢有度。" }
    - { value: 散文诗体, icon: Feather, description: "文笔优美抒情，节奏舒缓如歌。意象密集，修辞丰富，重视氛围与情绪渲染。叙事弱化，意境至上。" }
    - { value: 克苏鲁翻译体, icon: Snowflake, description: "欧化长句，形容词堆叠密集。常以'不可名状''亵渎''癫狂'等词渲染未知恐惧。叙述者神经质，反复强调恐惧与无力感。" }
    - { value: 番剧轻小说体, icon: MessageSquare, description: "对话密集，吐槽与内心戏穿插。短段落为主，常用括号补足心理活动。角色声口鲜明，节奏轻快，二次元梗自然嵌入。" }
