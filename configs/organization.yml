entity: Organization

fields:
  name:
    type: text
    label: 组织名称
    placeholder: 组织名称
  description:
    type: longtext
    label: 描述
    noLabel: true
    placeholder: 组织的简要描述
    maxLength: 300
  type:
    type: multi
    max: 2
    label: 组织类型
    noLabel: true
    options: org-type
    className: grid grid-cols-4 gap-1
  status:
    type: single
    label: 状态
    noLabel: true
    options: org-status
    display: flex
    rootClassName: col-span-full
  foundingBackground:
    type: longtext
    label: 成立背景
    noLabel: true
    placeholder: 组织成立的背景与契机
    maxLength: 200
  founder:
    type: text
    label: 创始人
    placeholder: 创始人姓名
  currentLeader:
    type: text
    label: 当前负责人
    placeholder: 当前负责人姓名
  operationLogic:
    type: longtext
    label: 运行逻辑
    noLabel: true
    placeholder: 组织的运作方式和逻辑
    maxLength: 300
  structure:
    type: list
    label: 结构
    noLabel: true
    subFields:
      - { placeholder: 等级, width: w-1/4 }
      - { placeholder: 作用/职责, width: flex-1 }
  headquarters:
    type: tags
    label: 总部/据点
    noLabel: true
  members:
    type: list
    label: 成员
    noLabel: true
    subFields:
      - { placeholder: 代号, width: w-1/4 }
      - { placeholder: 等级, width: w-1/4, type: select, optionsFrom: structure }
      - { placeholder: 备注, width: flex-1 }
  opponents:
    type: tags
    label: 对手
    rootClassName: flex items-center gap-1
  mortalEnemies:
    type: tags
    label: 死敌
    rootClassName: flex items-center gap-1
  allies:
    type: tags
    label: 盟友
    rootClassName: flex items-center gap-1

sections:
- type: card
  title: 基本信息
  icon: Building2
  titleKey: name
  titleEditable: true
  class: grid grid-cols-2 gap-3
  fields: [founder, currentLeader, status]
- type: tabs
  title: 组织详情
  children:
    - key: description
      label: 描述
      fields: [description]
    - key: foundingBackground
      label: 成立背景
      fields: [foundingBackground]
    - key: operationLogic
      label: 运行逻辑
      fields: [operationLogic]
    - key: structure
      label: 等级结构
      fields: [structure]
    - key: members
      label: 成员名单
      fields: [members]
- type: card
  title: 组织类型
  icon: Tag
  fields: [type]
- type: grid
  cols: 2
  sections:
    - type: card
      title: 据点
      icon: MapPin
      fields: [headquarters]
    - type: card
      title: 外部关系
      icon: Users
      class: space-y-2
      fields: [opponents, mortalEnemies, allies]

